# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.0"
metadata:
  name: zmanagehamper
type: application
builder:
  resources:
    excludes:
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://intsv137.lindt.net:8040
          client: '200'
        app:
          name: Z_MANAGE_HAMPER
          package: Z_MANAGE_HAMPER
          transport: ''
